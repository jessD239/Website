<div class="contact-modal" id="contactModal">
  <div class="contact-modal__content">
    <div class="contact-modal__header">
      <h2 class="contact-modal__title">Get in Touch</h2>
      <p class="contact-modal__subtitle">Tell us about your project. We'll get back to you shortly.</p>
    </div>

    <form class="contact-form" id="contactForm">
      <div class="contact-form__group">
        <label for="contactName" class="contact-form__label">Name</label>
        <input type="text" id="contactName" name="name" class="contact-form__input" placeholder="Your name" required />
      </div>

      <div class="contact-form__group">
        <label for="contactEmail" class="contact-form__label">Email</label>
        <input
          type="email"
          id="contactEmail"
          name="email"
          class="contact-form__input"
          placeholder="your@email.com"
          required
        />
      </div>

      <div class="contact-form__group">
        <label for="contactPhone" class="contact-form__label">Phone (optional)</label>
        <input type="tel" id="contactPhone" name="phone" class="contact-form__input" placeholder="+64 21..." />
      </div>

      <div class="contact-form__group">
        <label for="contactMessage" class="contact-form__label">Message</label>
        <textarea
          id="contactMessage"
          name="message"
          class="contact-form__textarea"
          placeholder="Tell us about your project..."
          required
        ></textarea>
      </div>

      <div class="contact-modal__actions">
        <button type="button" class="contact-modal__close" data-contact-close>Cancel</button>
        <button type="submit" class="contact-modal__submit">Send Message</button>
      </div>
    </form>
  </div>
</div>
