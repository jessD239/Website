<section class="cta" id="contact">
  <div class="container">
    <div class="cta__inner reveal">
      <p class="section-label section-label--light">Start a Project</p>
      <h2 class="cta__title">Let's make<br />something together.</h2>
      <p class="cta__text">
        Whether you have a brief ready or just an idea taking shape, we'd love to hear from you. Every great project
        starts with a conversation.
      </p>
      <div class="cta__actions">
        <button onclick="openContactModal()" class="btn btn--light" style="border: none; cursor: pointer" type="button">
          Get in Touch <span class="btn__arrow">→</span>
        </button>
        <a href="#work" class="btn btn--outline-light">View Our Work</a>
      </div>
      <div class="cta__details">
        <div class="cta__detail">
          <p class="cta__detail-label">Email</p>
          <a href="mailto:hello@pwi.studio" class="cta__detail-value">hello@pwi.studio</a>
        </div>
        <div class="cta__detail">
          <p class="cta__detail-label">Phone</p>
          <a href="tel:+64211234567" class="cta__detail-value">+64 21 123 4567</a>
        </div>
        <div class="cta__detail">
          <p class="cta__detail-label">Location</p>
          <p class="cta__detail-value">Auckland, New Zealand</p>
        </div>
      </div>
    </div>
  </div>
</section>
